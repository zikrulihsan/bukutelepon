version: "3.9"

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: bukutelepon-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: bukutelepon-client
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: bukutelepon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - client
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
