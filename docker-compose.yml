services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: development
    container_name: bukutelepon-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - ./server/src:/app/src
      - ./prisma:/app/prisma
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: bukutelepon-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    depends_on:
      - api
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: bukutelepon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - client
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
